<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BP Chart Extensions 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="tableau.extensions.js" onerror="console.warn('Tableau Extensions API not available — running in preview mode')"></script>
  <style>
    :root {
      --grey-900: #1A1A1A;
      --grey-800: #2A2828;
      --grey-700: #4D4D4D;
      --grey-500: #808080;
      --grey-300: #B3B3B3;
      --grey-100: #E6E6E6;
      --primary-500: #E994A2;
      --primary-700: #E0697D;
      --primary-900: #D73F58;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Tableau Regular', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    #app-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #chart-header {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px 0;
      flex-shrink: 0;
      min-height: 58px;
    }

    #period-selector {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-wrap: wrap;
    }

    .period-btn {
      border: none;
      height: 46px;
      padding: 0 14px;
      font-size: 10px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: #444;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .period-btn.active {
      background: #2e2e2e;
      color: #e6e6e6;
      box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    #chart {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }


    .error {
      color: #e994a2;
      font-size: 13px;
      padding: 16px;
      font-family: monospace;
    }

    /* ── Settings Dialog ── */
    #settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #settings-dialog {
      background: #222222;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      width: 680px;
      max-width: 95vw;
      color: #e6e6e6;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
    }

    #settings-dialog h2 {
      font-size: 15px;
      color: #e994a2;
      margin-bottom: 16px;
      font-weight: 400;
      letter-spacing: 0.06em;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    #settings-dialog h2 .version {
      font-size: 10px;
      color: #666;
      letter-spacing: 0.04em;
      font-style: normal;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px 16px;
    }

    .field { margin-bottom: 0; }
    .field-full { grid-column: 1 / -1; }

    .field label {
      display: block;
      font-size: 10px;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
    }

    .field select,
    .field input[type="text"] {
      width: 100%;
      background: #333333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e6e6e6;
      padding: 4px 8px;
      font-size: 12px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      outline: none;
    }

    .field select:focus,
    .field input:focus { border-color: #e994a2; }

    .field input[type="color"] {
      width: 100%;
      height: 30px;
      padding: 2px;
      background: #333333;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
    }

    .inline-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .inline-controls input[type="color"] {
      width: 48px;
      height: 30px;
      padding: 2px;
      background: #333333;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .inline-controls input[type="checkbox"] {
      accent-color: #e994a2;
      width: 13px;
      height: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .inline-controls span {
      font-size: 10px;
      color: #666;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
    }

    .field .hint {
      font-size: 10px;
      color: #555;
      margin-top: 3px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
    }

    details { grid-column: 1 / -1; margin-top: 4px; }

    details summary {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      user-select: none;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
    }

    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: '▶'; font-size: 8px; transition: transform 0.15s; }
    details[open] summary::before { transform: rotate(90deg); }

    .fields-grid-advanced {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px 16px;
      margin-top: 10px;
    }

    .btn {
      width: 100%;
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.05em;
    }

    .btn-primary { background: #e994a2; color: #222; }
    .btn-primary:hover { background: #d4778a; }
    .btn-secondary { background: #333333; color: #e6e6e6; border: 1px solid #555; }
    .btn-secondary:hover { background: #3a3a3a; }

    /* ── Configure gear button ── */
    #configure-btn {
      position: fixed;
      bottom: 6px;
      right: 6px;
      background: none;
      border: none;
      color: #666;
      font-size: 10px;
      cursor: pointer;
      z-index: 100;
      opacity: 0.15;
      transition: opacity 0.2s;
      padding: 0;
      line-height: 1;
    }
    #configure-btn:hover { opacity: 0.6; }

    /* ── View toggle pill ── */
    #view-toggle {
      display: block;
    }

    .pill-wrap {
      display: flex;
      align-items: center;
      background: #111111;
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
    }

    .pill-btn {
      border: none;
      height: 46px;
      padding: 0 22px;
      font-size: 11px;
      font-family: 'Tableau Light', 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: #444;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .pill-btn.active {
      background: #2e2e2e;
      color: #e6e6e6;
      box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="chart-header">
      <div id="period-selector"></div>
      <div id="view-toggle">
        <div class="pill-wrap">
          <button class="pill-btn active" id="btn-qtr">Quarters</button>
          <button class="pill-btn"        id="btn-mo">Months</button>
        </div>
      </div>
    </div>
    <div id="chart"></div>
  </div>
  <button id="configure-btn" title="Configure chart">⚙</button>

  <script>
  // ─── VERSION ──────────────────────────────────────────────────────────────
  const VERSION = '2026-05-21.17';

  // ─── FONTS ────────────────────────────────────────────────────────────────
  const FONT_TITLE = "'Baskervville', 'Baskerville', Georgia, serif";
  const FONT_BODY  = "'Tableau Regular', 'Helvetica Neue', Arial, sans-serif";
  const FONT_LIGHT = "'Tableau Light', 'Helvetica Neue', Arial, sans-serif";

  // ─── BASE COLOURS ─────────────────────────────────────────────────────────
  const COL_WHITE      = '#ffffff';
  const COL_LIGHT_GREY = '#e6e6e6';
  const COL_DARK_GREY  = '#666666';
  const COL_GRID       = '#444444';

  // ─── METRIC → CHART MAPPING ───────────────────────────────────────────────
  // First entry = default. All entries = structurally compatible.
  // Snapshot charts: data reduced to latest period before rendering.
  // Trend charts: all periods passed through (monthly or quarterly per _viewMode).
  const METRIC_CHARTS = {
    tam:   ['ban'],
    cagr:  ['ban'],
    mcon:  ['ban'],

    // Ratio 0–1, per-brand per-month — supports snapshot + trend
    eqr:   ['vbar-stacked', 'hbar', 'scale-figma', 'inset-bubble', 'progress-ring',
            'waffle', 'bubbles', 'treemap', 'treemap-bar', 'donut', 'bans',
            'line-smooth', 'line-straight', 'area-100', 'stream', 'small-multiples', 'slope'],

    ebl:   ['vbar-stacked', 'hbar', 'scale-figma', 'inset-bubble', 'progress-ring',
            'waffle', 'bubbles', 'treemap', 'treemap-bar', 'donut', 'bans',
            'line-smooth', 'line-straight', 'area-100', 'stream', 'small-multiples', 'slope'],

    sstsr: ['hbar', 'scale-figma', 'inset-bubble', 'progress-ring', 'waffle',
            'vbar-stacked', 'bubbles', 'treemap', 'treemap-bar', 'donut', 'bans',
            'line-smooth', 'line-straight', 'area-100', 'stream', 'small-multiples', 'slope'],

    // Compositional share (brands sum ~100%), per-brand per-month
    sov:   ['area-100', 'treemap-bar', 'stream', 'hbar', 'scale-figma', 'bubbles',
            'inset-bubble', 'line-smooth', 'line-straight', 'small-multiples',
            'treemap', 'donut', 'bans'],

    bss:   ['area-100', 'treemap-bar', 'stream', 'hbar', 'scale-figma', 'bubbles',
            'inset-bubble', 'line-smooth', 'line-straight', 'small-multiples',
            'treemap', 'donut', 'bans'],

    // Signed float — trend charts only (negatives break snapshot bars)
    vom:   ['line-smooth', 'line-straight', 'small-multiples', 'slope'],
    svt:   ['line-smooth', 'line-straight', 'small-multiples', 'slope'],

    // Likert 1–5 snapshot — no waffle/arc/progress-ring (not true ratios)
    bt:    ['scale-figma', 'hbar', 'bans', 'slope', 'ban'],
    nps:   ['hbar', 'scale-figma', 'bans', 'slope', 'ban'],
    sop:   ['scale-figma', 'hbar', 'bans', 'slope', 'ban'],
    dvtr:  ['hbar', 'scale-figma', 'bans', 'slope', 'ban'],

    // Unbounded positive snapshot
    cra:   ['hbar', 'scale-figma', 'bans', 'bubbles', 'treemap', 'treemap-bar',
            'donut', 'inset-bubble', 'ban'],

    // Brand attributes — multiscale blocked until multi-attribute data confirmed
    ba:    ['hbar', 'scale-figma', 'bans', 'ban'],
  };

  // ─── AGGREGATION RULES ────────────────────────────────────────────────────
  // Applied when collapsing monthly rows to quarterly view.
  const INDICATOR_AGGREGATION = {
    sov:   'sum',
    bss:   'sum',
    sstsr: 'sum',
    cra:   'sum',
    vom:   'sum',
    eqr:   'avg',
    ebl:   'avg',
    svt:   'avg',
    bt:    'avg',
    nps:   'avg',
    sop:   'avg',
    dvtr:  'avg',
    tam:   'none',
    cagr:  'none',
    mcon:  'none',
    ba:    'none',
  };

  // ─── TREND-CAPABLE INDICATORS ─────────────────────────────────────────────
  // Only these show the Qtr/Mo pill toggle.
  const INDICATOR_TREND = {
    eqr: true, ebl: true, sstsr: true,
    sov: true, bss: true,
    vom: true, svt: true,
  };

  // ─── MULTI-PERIOD CHART TYPES ─────────────────────────────────────────────
  const MULTI_PERIOD_CHARTS = [
    'line-smooth', 'line-straight',
    'area-100', 'small-multiples', 'stream', 'slope',
  ];

  // ─── DESIGN SYSTEM ────────────────────────────────────────────────────────
  function buildDesign() {
    const sel = CONFIG.selectedColor;
    return {
      donut: {
        banValue:      { font: FONT_TITLE, style: 'italic', color: sel },
        banLabel:      { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        legendLabel:   { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        legendValue:   { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        legendSelected:{ font: FONT_LIGHT, style: 'normal', color: sel },
      },
      bar: {
        valueLabel:    { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
        valueLabelSel: { font: FONT_BODY,  style: 'normal', color: sel },
        axisLabel:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        axisLabelSel:  { font: FONT_LIGHT, style: 'normal', color: sel },
      },
      line: {
        axisX:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        axisY:     { font: FONT_LIGHT, style: 'normal', color: COL_DARK_GREY },
        gridColor: COL_GRID,
      },
      ban: {
        value: { font: FONT_TITLE, style: 'italic', color: sel },
        label: { font: FONT_LIGHT, style: 'normal', color: COL_LIGHT_GREY },
      },
      bans: {
        primaryValue: { font: FONT_TITLE, size: 56, color: sel },
        compValue:    { font: FONT_TITLE, size: 32, color: '#808080' },
      },
      slope:         { lineP: { color: sel, width: 2.5 }, lineC: { color: '#808080', width: 1 } },
      area100:       { primary: sel, comp: '#808080' },
      stream:        { primary: sel, comp: '#808080' },
      treemap:       { primary: sel, comp: '#808080' },
      treemapBar:    { primary: sel, comp: '#808080' },
      bubbles:       { primary: sel, comp: '#808080' },
      insetBubble:   { primary: sel, comp: '#808080' },
      progressRing:  { primary: sel, comp: '#808080' },
      waffle:        { filled: sel, comp: '#808080', empty: '#4D4D4D', neg: '#D73F58' },
      hbar:          { primary: sel, comp: '#808080' },
      vbarStacked:   { primaryActive: sel, primaryPassive: '#E0697D', compActive: '#808080', compPassive: '#4D4D4D' },
      scaleFigma:    { primary: sel, comp: '#808080' },
      multiscale:    { primary: sel, comp: '#808080' },
      dotMatrix:     { filled: sel, comp: '#808080', passive: '#4D4D4D', neg: '#D73F58' },
      smallMultiples:{ primary: sel, comp: '#808080' },
      arc:           { fill: sel },
    };
  }

  // ─── SHARED HELPERS ───────────────────────────────────────────────────────
  function sortWithPrimaryLast(data, primary) {
    return [
      ...data.filter(d => d.name !== primary),
      ...data.filter(d => d.name === primary),
    ];
  }

  function showTooSmall(el) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;' +
      'height:100%;font-size:11px;font-family:\'Tableau Light\',Arial,sans-serif;' +
      'color:var(--grey-700)">Container too small</div>';
  }

  function showEmpty(el) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;' +
      'height:100%;font-size:11px;font-family:\'Tableau Light\',Arial,sans-serif;' +
      'color:var(--grey-700)">No data available</div>';
  }

  function applySelectionOpacity(containerEl, selected) {
    d3.select(containerEl).selectAll('[data-brand]')
      .transition().duration(300).ease(d3.easeCubicOut)
      .style('opacity', function() {
        if (!selected) return 1;
        return this.getAttribute('data-brand') === selected ? 1 : 0.2;
      });
  }

  // ─── PERIOD HELPERS ───────────────────────────────────────────────────────
  function toYearMonth(year, month) {
    return Math.round(year) + '-' + String(Math.round(month)).padStart(2, '0');
  }

  function toYearQuarter(yearmonth) {
    var parts = yearmonth.split('-');
    var y = parseInt(parts[0]);
    var m = parseInt(parts[1]);
    return y + '-Q' + Math.ceil(m / 3);
  }

  // Returns the three yearmonth strings belonging to a given year+quarter.
  function quarterMonths(year, quarter) {
    var startMonth = (quarter - 1) * 3 + 1;
    var result = [];
    for (var i = 0; i < 3; i++) {
      result.push(toYearMonth(year, startMonth + i));
    }
    return result;
  }

  function sortByPeriod(data) {
    return data.slice().sort(function(a, b) {
      return (a.period || '').localeCompare(b.period || '');
    });
  }

  // ─── QUARTERLY AGGREGATION ────────────────────────────────────────────────
  function aggregateByQuarter(data, metricId) {
    var aggRule = INDICATOR_AGGREGATION[metricId] || 'avg';

    // Group by brand + yearquarter
    var grouped = {};
    data.forEach(function(d) {
      if (!d.period) return;
      var yq  = toYearQuarter(d.period);
      var key = d.name + '||' + yq;
      if (!grouped[key]) grouped[key] = { name: d.name, period: yq, values: [], months: [] };
      grouped[key].values.push(d.value);
      grouped[key].months.push(d.period);
    });

    // Only keep complete quarters (all 3 months present for this brand)
    var result = [];
    Object.keys(grouped).forEach(function(key) {
      var g = grouped[key];
      var qparts = g.period.split('-Q');
      var year    = parseInt(qparts[0]);
      var quarter = parseInt(qparts[1]);
      var expected = quarterMonths(year, quarter);
      var complete = expected.every(function(ym) { return g.months.indexOf(ym) !== -1; });
      if (!complete) return;

      var value = aggRule === 'sum'
        ? d3.sum(g.values)
        : d3.mean(g.values);

      result.push({ name: g.name, period: g.period, value: value });
    });

    return sortByPeriod(result);
  }

  // ─── PIVOT LONG → WIDE ────────────────────────────────────────────────────
  // Used by chart renderers that expect { period, Brand1: v, Brand2: v, ... }
  function pivotToWide(data) {
    var periods = [];
    var brands  = [];
    data.forEach(function(d) {
      if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
      if (d.name   && brands.indexOf(d.name)   === -1) brands.push(d.name);
    });
    periods.sort();
    return periods.map(function(period) {
      var row = { period: period };
      brands.forEach(function(brand) {
        var match = data.find(function(d) { return d.name === brand && d.period === period; });
        row[brand] = match ? match.value : null;
      });
      return row;
    });
  }

  // ─── CHART RESOLVER ───────────────────────────────────────────────────────
  function resolveChart(metricId) {
    // 1. User saved a per-indicator override
    if (_chartOverrides[metricId]) return _chartOverrides[metricId];
    // 2. Recommended default for this metric
    var charts = METRIC_CHARTS[metricId];
    if (charts && charts.length) return charts[0];
    // 3. Global fallback
    return CONFIG.chart;
  }

  // ─── VIEW TOGGLE ─────────────────────────────────────────────────────────
  function setViewMode(mode) {
    _viewMode = mode;
    _selectedPeriod = 'all';
    refreshViewToggle();
    if (_dashboard) {
      var worksheet = _dashboard.worksheets.find(function(ws) { return ws.name === CONFIG.worksheet; });
      if (worksheet) fetchAndRender(worksheet, _dashboard);
    } else {
      renderChart(getSampleData(CONFIG.chart), _lastSelected, null);
    }
  }

  function refreshViewToggle() {
    var isTrend = INDICATOR_TREND[CONFIG.metricId];
    var header = document.getElementById('chart-header');
    if (header) header.style.display = isTrend ? 'flex' : 'none';

    var qBtn = document.getElementById('btn-qtr');
    var mBtn = document.getElementById('btn-mo');
    if (qBtn && mBtn) {
      if (_viewMode === 'quarterly') {
        qBtn.className = 'pill-btn active';
        mBtn.className = 'pill-btn';
      } else {
        qBtn.className = 'pill-btn';
        mBtn.className = 'pill-btn active';
      }
    }
    refreshPeriodSelector();
  }

  function refreshPeriodSelector() {
    var el = document.getElementById('period-selector');
    if (!el) return;
    el.innerHTML = '';
    if (!_allData || !INDICATOR_TREND[CONFIG.metricId]) return;
    var periods = [];
    _allData.forEach(function(d) {
      if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
    });
    periods.sort();
    if (periods.length <= 1) return;

    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;background:#111111;border-radius:8px;padding:3px;gap:2px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);';
    ['all'].concat(periods).forEach(function(p) {
      var isActive = _selectedPeriod === p;
      var btn = document.createElement('button');
      var agg = INDICATOR_AGGREGATION[CONFIG.metricId] || 'avg';
      var allLabel = agg === 'sum' ? 'Total' : (agg === 'avg' ? 'Average' : 'All');
      btn.textContent = p === 'all' ? allLabel : p;
      btn.className = 'period-btn' + (isActive ? ' active' : '');
      btn.onclick = function() {
        _selectedPeriod = p;
        applyPeriodAndRender();
      };
      wrap.appendChild(btn);
    });
    el.appendChild(wrap);
  }

  function applyPeriodAndRender() {
    if (!_allData) return;
    var isMultiPeriod = MULTI_PERIOD_CHARTS.indexOf(CONFIG.chart) !== -1;
    var data;
    if (_selectedPeriod !== 'all') {
      data = _allData.filter(function(d) { return d.period === _selectedPeriod; });
      if (!data.length) { _selectedPeriod = 'all'; data = null; }
    }
    if (!data) {
      if (isMultiPeriod) {
        data = _allData;
      } else {
        var ps = [];
        _allData.forEach(function(d) { if (d.period && ps.indexOf(d.period) === -1) ps.push(d.period); });
        ps.sort();
        data = ps.length > 1 ? _allData.filter(function(d) { return d.period === ps[ps.length - 1]; }) : _allData;
      }
    }
    refreshPeriodSelector();

  // ─── LOAD TABLEAU API ─────────────────────────────────────────────────────
  function loadTableauAPI() {
    return Promise.resolve();
  }

  applyBackground();

  // ─── TABLEAU INIT ─────────────────────────────────────────────────────────
  loadTableauAPI().then(function() {
    if (typeof tableau === 'undefined') {
      showSettings(null);
      return;
    }

    tableau.extensions.initializeAsync({ configure: function() {
      var worksheets = _dashboard ? _dashboard.worksheets.map(function(ws) { return ws.name; }) : null;
      showSettings(worksheets);
    }}).then(async function() {
      _dashboard = tableau.extensions.dashboardContent.dashboard;

      var settings = tableau.extensions.settings;

      // Load scalar config fields
      Object.keys(DEFAULTS).forEach(function(k) {
        var val = settings.get(k);
        if (val) CONFIG[k] = val;
      });

      // Load per-indicator chart overrides
      var storedOverrides = settings.get('chartOverrides');
      if (storedOverrides) {
        try { _chartOverrides = JSON.parse(storedOverrides); } catch(e) {}
      }

      console.log('Loaded CONFIG:', JSON.stringify(CONFIG));
      console.log('Loaded overrides:', JSON.stringify(_chartOverrides));

      applyBackground();

      if (!CONFIG.worksheet) {
        var worksheets = _dashboard.worksheets.map(function(ws) { return ws.name; });
        showSettings(worksheets);
        return;
      }

      var worksheet = _dashboard.worksheets.find(function(ws) { return ws.name === CONFIG.worksheet; });
      if (!worksheet) {
        var worksheets2 = _dashboard.worksheets.map(function(ws) { return ws.name; });
        showSettings(worksheets2);
        return;
      }

      // Read parameters first so CONFIG.metricId is set before the initial render
      var allParams = await _dashboard.getParametersAsync();

      var indicatorParam = allParams.find(function(p) { return p.name === CONFIG.indicatorParameter; });
      if (indicatorParam) {
        var initId = (indicatorParam.currentValue.value ||
                      indicatorParam.currentValue.formattedValue || '').trim().toLowerCase();
        if (initId) {
          CONFIG.metricId = initId;
          CONFIG.chart    = resolveChart(initId);
          console.log('Indicator parameter initial value:', initId, '→ chart:', CONFIG.chart);
        } else {
          console.warn('Indicator parameter "' + CONFIG.indicatorParameter + '" found but has no value.');
        }
      } else {
        console.warn('Indicator parameter "' + CONFIG.indicatorParameter + '" not found. Available:', allParams.map(function(p) { return p.name; }).join(', '));
      }

      try { await worksheet.clearSelectedMarksAsync(); } catch(e) {}
      await fetchAndRender(worksheet, _dashboard);

      // Brand parameter listener
      var brandParam = allParams.find(function(p) { return p.name === CONFIG.parameter; });
      if (brandParam) {
        brandParam.addEventListener(tableau.TableauEventType.ParameterChanged, function() {
          fetchAndRender(worksheet, _dashboard);
        });
      }

      // Indicator parameter change listener
      if (indicatorParam) {
        indicatorParam.addEventListener(tableau.TableauEventType.ParameterChanged, async function(e) {
          var p  = await e.getParameterAsync();
          var id = (p.currentValue.value || p.currentValue.formattedValue || '').trim().toLowerCase();
          CONFIG.metricId = id;
          CONFIG.chart    = resolveChart(id);
          _selectedBrand  = null;
          _selectedPeriod = 'all';
          await fetchAndRender(worksheet, _dashboard);
        });
      }

    }).catch(function(err) {
      console.error('initializeAsync failed:', err);
      showSettings(null);
    });
  });

  // ─── DATA FETCHING ────────────────────────────────────────────────────────
  async function fetchAndRender(worksheet, dashboard) {
    try {
      var dataTable = await worksheet.getSummaryDataAsync({ maxRows: 5000 });
      var cols = dataTable.columns;
      var rows = dataTable.data;

      function colIdx(name) {
        var norm = name.toLowerCase().replace(/[\s_]+/g, '');
        return cols.findIndex(function(c) {
          return c.fieldName.toLowerCase().replace(/[\s_]+/g, '') === norm;
        });
      }
      var brandIdx    = colIdx(CONFIG.brandField);
      var valueIdx    = colIdx(CONFIG.valueField);
      var yearIdx     = colIdx(CONFIG.yearField);
      var monthIdx    = colIdx(CONFIG.monthField);
      var categoryIdx = colIdx(CONFIG.categoryField);
      var indicatorIdx= colIdx('indicator_id');

      if (brandIdx === -1 || valueIdx === -1) {
        var available = cols.map(function(c) { return c.fieldName; }).join(', ');
        showError('Field not found. Need "' + CONFIG.brandField + '" + "' + CONFIG.valueField +
                  '". Available: ' + available);
        return;
      }

      var data = rows.map(function(row) {
        var rawVal = parseFloat(row[valueIdx].value);
        var year   = yearIdx  !== -1 ? parseFloat(row[yearIdx].value)  : null;
        var month  = monthIdx !== -1 ? parseFloat(row[monthIdx].value) : null;

        var period = null;
        if (year && month && !isNaN(year) && !isNaN(month)) {
          period = toYearMonth(year, month);
        }

        return {
          name:      row[brandIdx].formattedValue || row[brandIdx].value,
          value:     isNaN(rawVal) ? null : rawVal,
          indicator: indicatorIdx !== -1 ? (row[indicatorIdx].value || '') : null,
          category:  categoryIdx  !== -1 ? (row[categoryIdx].value  || '') : null,
          period:    period,
        };
      })
      .filter(function(d) { return d.value !== null; })           // drop NaN rows
      .filter(function(d) { return d.name !== 'coffee_general'; })// drop category-level rows
      .filter(function(d) {
        // Filter by indicator if set
        return !CONFIG.metricId || d.indicator === CONFIG.metricId;
      });

      var isMultiPeriod = MULTI_PERIOD_CHARTS.indexOf(CONFIG.chart) !== -1;
      var isTrend       = INDICATOR_TREND[CONFIG.metricId];

      if (isTrend) {
        // Apply quarterly or monthly aggregation; keep all periods for the selector
        if (_viewMode === 'quarterly') {
          data = aggregateByQuarter(data, CONFIG.metricId);
        } else {
          data = sortByPeriod(data.filter(function(d) { return d.period; }));
        }
      } else {
        // Non-trend indicator: snapshot — reduce to latest yearmonth period
        var periods = [];
        data.forEach(function(d) {
          if (d.period && periods.indexOf(d.period) === -1) periods.push(d.period);
        });
        periods.sort();
        if (periods.length > 1) {
          var latest = periods[periods.length - 1];
          data = data.filter(function(d) { return d.period === latest; });
        }
      }

      if (!data.length) { showEmpty(document.getElementById('chart')); return; }

      // Store all aggregated periods for period selector; reset selection
      _allData = data;
      _selectedPeriod = 'all';

      // Resolve client brand (always from Select Client Brand parameter — never changes on click)
      var allParams = await dashboard.getParametersAsync();
      var brandParam = allParams.find(function(p) { return p.name === CONFIG.parameter; });
      if (brandParam) {
        var raw = (brandParam.currentValue.value || brandParam.currentValue.formattedValue || '').trim();
        var match = data.find(function(d) {
          return d.name.trim().toLowerCase() === raw.toLowerCase();
        });
        _clientBrand = match ? match.name : (data[0] ? data[0].name : '');
      } else {
        _clientBrand = data[0] ? data[0].name : '';
      }
      if (!_clientBrand || !data.find(function(d) { return d.name === _clientBrand; })) {
        _clientBrand = data[0] ? data[0].name : null;
      }
      _selectedBrand = null;

      refreshViewToggle();
      applyPeriodAndRender();

    } catch(err) {
      showError('Data error: ' + err.message);
    }
  }

  // ─── ROUTER ───────────────────────────────────────────────────────────────
  function renderChart(data, selectedBrand, dashboard) {
    _lastData     = data;
    _lastSelected = selectedBrand;

    var el = document.getElementById('chart');
    el.innerHTML = '';
    el.removeAttribute('style');

    var D = buildDesign();

    // Charts that need wide-format data
    var needsWide = ['line-straight','line-smooth','area-100','stream','small-multiples'];
    var chartData = (needsWide.indexOf(CONFIG.chart) !== -1 && Array.isArray(data) && data[0] && data[0].name)
      ? pivotToWide(data)
      : data;

    switch (CONFIG.chart) {
      case 'donut':          renderDonut(el, data, selectedBrand, dashboard, D.donut);           break;
      case 'bar':            renderBar(el, data, selectedBrand, dashboard, D.bar);               break;
      case 'line':           renderLine(el, data, selectedBrand, dashboard, D.line);             break;
      case 'ban':            renderBAN(el, data, selectedBrand, D.ban);                          break;
      case 'bans':           renderBANs(el, data, selectedBrand, D.bans);                        break;
      case 'line-straight':  renderLineChart(el, chartData, selectedBrand, true);                break;
      case 'line-smooth':    renderLineChart(el, chartData, selectedBrand, false);               break;
      case 'slope':          renderSlope(el, data, selectedBrand, D.slope);                      break;
      case 'area-100':       renderArea100(el, chartData, selectedBrand, D.area100);             break;
      case 'stream':         renderStream(el, chartData, selectedBrand, D.stream);               break;
      case 'treemap':        renderTreemap(el, data, selectedBrand, D.treemap);                  break;
      case 'treemap-bar':    renderTreemapBar(el, data, selectedBrand, D.treemapBar);            break;
      case 'bubbles':        renderBubbles(el, data, selectedBrand, D.bubbles);                  break;
      case 'inset-bubble':   renderInsetBubble(el, data, selectedBrand, D.insetBubble);          break;
      case 'progress-ring':  renderProgressRing(el, data, selectedBrand, D.progressRing);        break;
      case 'waffle':         renderWaffle(el, data, selectedBrand, D.waffle);                    break;
      case 'hbar':           renderHBar(el, data, selectedBrand, dashboard, D.hbar);             break;
      case 'vbar-stacked':   renderVBarStacked(el, data, selectedBrand, D.vbarStacked);          break;
      case 'scale-figma':    renderScaleFigma(el, data, selectedBrand, D.scaleFigma);            break;
      case 'multiscale':     renderMultiScale(el, data, selectedBrand, D.multiscale);            break;
      case 'dot-matrix':     renderDotMatrix(el, data, selectedBrand, D.dotMatrix);              break;
      case 'small-multiples':renderSmallMultiples(el, chartData, selectedBrand, D.smallMultiples);break;
      case 'arc':            renderArc(el, data, selectedBrand, D.arc);                          break;
      default: showError('Unknown chart type: "' + CONFIG.chart + '"');
    }

    refreshViewToggle();

    // Restore highlight after entrance animations settle
    if (_selectedBrand) {
      var _captureEl = el;
      setTimeout(function() { applySelectionOpacity(_captureEl, _selectedBrand); }, 850);
    }
  }

  // ─── MARK SELECTOR ───────────────────────────────────────────────────────
  async function selectBrand(name, dashboard) {
    // Toggle: clicking the same brand deselects
    _selectedBrand = (_selectedBrand === name) ? null : name;
    applySelectionOpacity(document.getElementById('chart'), _selectedBrand);
    if (!dashboard) return;
    if (_selectedBrand) {
      var criteria = [{ fieldName: CONFIG.brandField, value: _selectedBrand }];
      await Promise.allSettled(
        dashboard.worksheets
          .filter(function(ws) { return ws.name !== CONFIG.worksheet; })
          .map(function(ws) {
            return ws.selectMarksByValueAsync(criteria, tableau.SelectionUpdateType.Replace);
          })
      );
    } else {
      await Promise.allSettled(
        dashboard.worksheets
          .filter(function(ws) { return ws.name !== CONFIG.worksheet; })
          .map(function(ws) { return ws.clearSelectedMarksAsync(); })
      );
    }
  }

  // ─── HELPERS ─────────────────────────────────────────────────────────────
  function truncLabel(name, containerW) {
    if (containerW >= 500 || name.length <= 9) return name;
    return name.slice(0, 8) + '…';
  }

  // ─── CHART: DONUT ─────────────────────────────────────────────────────────
  function renderDonut(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || window.innerWidth  || 480;
    var H = rect.height || window.innerHeight || 300;
    var legendW = Math.min(Math.floor(W * 0.38), 220);
    var available = W - legendW;
    var R = Math.min(H * 0.44, available * 0.5, H < 200 ? 60 : 150);
    var inner = R * 0.46;

    el.style.display        = 'flex';
    el.style.alignItems     = 'center';
    el.style.justifyContent = 'center';
    el.style.gap            = '20px';
    el.style.padding        = '12px';

    var ban = document.createElement('div');
    ban.style.cssText = 'display:flex;flex-direction:column;gap:6px;min-width:110px;';
    var sel = data.find(function(d) { return d.name === selectedBrand; }) || data[0];
    ban.innerHTML =
      '<div style="font-size:' + Math.max(36, R*0.5) + 'px;line-height:1;' +
      'color:' + D.banValue.color + ';font-family:' + D.banValue.font + ';' +
      'font-style:' + D.banValue.style + ';font-weight:400;">' +
      (sel ? sel.value.toFixed(1) : '--') + '</div>' +
      '<div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;' +
      'color:' + D.banLabel.color + ';font-family:' + D.banLabel.font + ';">' +
      (sel ? sel.name : '') + '</div>';
    el.appendChild(ban);

    var svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.setAttribute('width',  R * 2 + 24);
    svgEl.setAttribute('height', R * 2 + 24);
    svgEl.style.flexShrink = '0';
    el.appendChild(svgEl);

    var svg = d3.select(svgEl);
    var g   = svg.append('g').attr('transform', 'translate(' + (R+12) + ',' + (R+12) + ')');

    var arc      = d3.arc().innerRadius(inner).outerRadius(R).padAngle(0.028).cornerRadius(2);
    var arcHover = d3.arc().innerRadius(inner).outerRadius(R+7).padAngle(0.028).cornerRadius(2);
    var pie      = d3.pie().value(function(d) { return d.value; }).sort(null);

    var isTransparent = CONFIG.bgColor === 'transparent';
    var holeColor     = isTransparent ? 'transparent' : CONFIG.bgColor;

    g.selectAll('path').data(pie(data)).join('path')
      .attr('d', arc)
      .attr('fill', function(d) { return d.data.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
      .attr('stroke', holeColor)
      .attr('stroke-width', isTransparent ? 0 : 2)
      .attr('data-brand', function(d) { return d.data.name; })
      .style('cursor', 'pointer')
      .on('mouseover', function() { d3.select(this).attr('d', arcHover); })
      .on('mouseout',  function() { d3.select(this).attr('d', arc); })
      .on('click', async function(e, d) { await selectBrand(d.data.name, dashboard); });

    g.append('circle')
      .attr('r', inner - 2)
      .attr('fill', holeColor)
      .attr('fill-opacity', isTransparent ? 0 : 1);

    var legend = document.createElement('div');
    legend.style.cssText = 'display:flex;flex-direction:column;gap:7px;';
    data.forEach(function(d) {
      var isSelected  = d.name === selectedBrand;
      var labelStyle  = isSelected ? D.legendSelected : D.legendLabel;
      var item = document.createElement('div');
      item.setAttribute('data-brand', d.name);
      item.style.cssText =
        'display:flex;align-items:center;gap:7px;cursor:pointer;' +
        'font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'color:' + labelStyle.color + ';font-family:' + labelStyle.font + ';';
      item.innerHTML =
        '<span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;' +
        'background:' + (isSelected ? CONFIG.selectedColor : CONFIG.neutralColor) + ';"></span>' +
        '<span style="flex:1;">' + d.name + '</span>' +
        '<span style="color:' + D.legendValue.color + ';font-family:' + D.legendValue.font + ';">' +
        d.value.toFixed(1) + '</span>';
      item.onclick = (function(name) {
        return async function() { await selectBrand(name, dashboard); };
      })(d.name);
      legend.appendChild(item);
    });
    el.appendChild(legend);
  }

  // ─── CHART: BAR ───────────────────────────────────────────────────────────
  function renderBar(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || 500;
    var H = rect.height || 300;

    var sorted = data.slice().sort(function(a, b) { return b.value - a.value; });
    var svg = d3.select(el).append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .style('width', '100%').style('height', '100%').style('display', 'block');

    var isHorizontal = H < 220 || H < W * 0.35;

    if (isHorizontal) {
      var m = { top:8, right:48, bottom:8, left:88 };
      var w = W - m.left - m.right;
      var h = H - m.top  - m.bottom;
      var g = svg.append('g').attr('transform', 'translate(' + m.left + ',' + m.top + ')');

      var y = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, h]).padding(0.22);
      var x = d3.scaleLinear().domain([0, d3.max(data, function(d) { return d.value; }) * 1.15]).range([0, w]);

      g.selectAll('rect').data(sorted).join('rect')
        .attr('x', 0).attr('y', function(d) { return y(d.name); })
        .attr('width', function(d) { return x(d.value); })
        .attr('height', y.bandwidth())
        .attr('fill', function(d) { return d.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
        .attr('rx', 2).style('cursor', 'pointer')
        .on('click', async function(e, d) { await selectBrand(d.name, dashboard); });

      g.selectAll('.vl').data(sorted).join('text').attr('class', 'vl')
        .attr('x', function(d) { return x(d.value) + 4; })
        .attr('y', function(d) { return y(d.name) + y.bandwidth() / 2; })
        .attr('dominant-baseline', 'middle')
        .style('fill',        function(d) { return d.name === selectedBrand ? D.valueLabelSel.color : D.valueLabel.color; })
        .style('font-size',   '10px')
        .style('font-family', function(d) { return d.name === selectedBrand ? D.valueLabelSel.font : D.valueLabel.font; })
        .text(function(d) { return d.value.toFixed(1); });

      g.selectAll('.lbl').data(sorted).join('text').attr('class', 'lbl')
        .attr('x', -6).attr('y', function(d) { return y(d.name) + y.bandwidth() / 2; })
        .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
        .style('fill',           function(d) { return d.name === selectedBrand ? D.axisLabelSel.color : D.axisLabel.color; })
        .style('font-size',      '10px')
        .style('font-family',    function(d) { return d.name === selectedBrand ? D.axisLabelSel.font : D.axisLabel.font; })
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .text(function(d) { return truncLabel(d.name, W); });
    } else {
      var m2 = { top:24, right:16, bottom:48, left:44 };
      var w2 = W - m2.left - m2.right;
      var h2 = H - m2.top  - m2.bottom;
      var g2 = svg.append('g').attr('transform', 'translate(' + m2.left + ',' + m2.top + ')');

      var x2 = d3.scaleBand().domain(sorted.map(function(d) { return d.name; })).range([0, w2]).padding(0.28);
      var y2 = d3.scaleLinear().domain([0, d3.max(data, function(d) { return d.value; }) * 1.15]).range([h2, 0]);

      g2.selectAll('rect').data(sorted).join('rect')
        .attr('x', function(d) { return x2(d.name); })
        .attr('y', function(d) { return y2(d.value); })
        .attr('width', x2.bandwidth())
        .attr('height', function(d) { return h2 - y2(d.value); })
        .attr('fill', function(d) { return d.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor; })
        .attr('rx', 2).style('cursor', 'pointer')
        .on('click', async function(e, d) { await selectBrand(d.name, dashboard); });

      g2.selectAll('.vl').data(sorted).join('text').attr('class', 'vl')
        .attr('x', function(d) { return x2(d.name) + x2.bandwidth() / 2; })
        .attr('y', function(d) { return y2(d.value) - 5; })
        .attr('text-anchor', 'middle')
        .style('fill',        function(d) { return d.name === selectedBrand ? D.valueLabelSel.color : D.valueLabel.color; })
        .style('font-size',   '11px')
        .style('font-family', function(d) { return d.name === selectedBrand ? D.valueLabelSel.font : D.valueLabel.font; })
        .text(function(d) { return d.value.toFixed(1); });

      g2.append('g').attr('transform', 'translate(0,' + h2 + ')')
        .call(d3.axisBottom(x2).tickSize(0))
        .call(function(ax) { ax.select('.domain').remove(); })
        .selectAll('text')
        .style('fill',           function(d) { return d === selectedBrand ? D.axisLabelSel.color : D.axisLabel.color; })
        .style('font-size',      '10px')
        .style('font-family',    function(d) { return d === selectedBrand ? D.axisLabelSel.font : D.axisLabel.font; })
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .attr('dy', '1.4em')
        .text(function(d) { return truncLabel(d, W); });
    }
  }

  // ─── CHART: LINE ──────────────────────────────────────────────────────────
  function renderLine(el, data, selectedBrand, dashboard, D) {
    var rect = el.getBoundingClientRect();
    var W = rect.width  || 500;
    var H = rect.height || 300;
    var m = { top:20, right:88, bottom:40, left:40 };
    var w = W - m.left - m.right;
    var h = H - m.top  - m.bottom;

    if (!data[0] || !data[0].period) { renderBar(el, data, selectedBrand, dashboard, buildDesign().bar); return; }

    var brands  = [];
    var periods = [];
    data.forEach(function(d) {
      if (brands.indexOf(d.name)   === -1) brands.push(d.name);
      if (periods.indexOf(d.period)=== -1) periods.push(d.period);
    });
    periods.sort();

    var grouped = brands.map(function(brand) {
      return {
        name: brand,
        values: periods.map(function(period) {
          var match = data.find(function(d) { return d.name === brand && d.period === period; });
          return { period: period, value: match ? match.value : null };
        }).filter(function(d) { return d.value !== null; }),
      };
    });

    var svg = d3.select(el).append('svg')
      .attr('viewBox', '0 0 ' + W + ' ' + H)
      .style('width', '100%').style('height', '100%').style('display', 'block');
    var g = svg.append('g').attr('transform', 'translate(' + m.left + ',' + m.top + ')');

    var x = d3.scalePoint().domain(periods).range([0, w]).padding(0.1);
    var y = d3.scaleLinear().domain([
      d3.min(data, function(d) { return d.value; }) * 0.95,
      d3.max(data, function(d) { return d.value; }) * 1.1,
    ]).range([h, 0]);

    var line = d3.line().defined(function(d) { return d.value !== null; })
      .x(function(d) { return x(d.period); })
      .y(function(d) { return y(d.value); })
      .curve(d3.curveMonotoneX);

    grouped.filter(function(b) { return b.name !== selectedBrand; }).forEach(function(brand) {
      g.append('path').datum(brand.values)
        .attr('fill', 'none').attr('stroke', CONFIG.neutralColor)
        .attr('stroke-width', 1).attr('opacity', 0.5).attr('d', line)
        .style('pointer-events', 'none');
      g.append('path').datum(brand.values)
        .attr('fill', 'none').attr('stroke', 'transparent')
        .attr('stroke-width', 18).attr('d', line)
        .style('cursor', 'pointer')
        .on('click', (function(b) { return async function() { await selectBrand(b.name, dashboard); }; })(brand));
    });

    var selBrand = grouped.find(function(b) { return b.name === selectedBrand; });
    if (selBrand) {
      g.append('path').datum(selBrand.values)
        .attr('fill', 'none').attr('stroke', CONFIG.selectedColor)
        .attr('stroke-width', 2.5).attr('d', line).style('pointer-events', 'none');
      g.append('path').datum(selBrand.values)
        .attr('fill', 'none').attr('stroke', 'transparent')
        .attr('stroke-width', 18).attr('d', line).style('cursor', 'pointer')
        .on('click', async function() { await selectBrand(selBrand.name, dashboard); });
      g.selectAll('.dot').data(selBrand.values).join('circle').attr('class', 'dot')
        .attr('cx', function(d) { return x(d.period); })
        .attr('cy', function(d) { return y(d.value); })
        .attr('r', 3.5).attr('fill', CONFIG.selectedColor).style('cursor', 'pointer')
        .on('click', async function() { await selectBrand(selBrand.name, dashboard); });
    }

    var placedY = [];
    grouped.forEach(function(brand) {
      var last = brand.values[brand.values.length - 1];
      if (!last) return;
      var ly = y(last.value);
      placedY.forEach(function(py) { if (Math.abs(py - ly) < 12) ly = py + 12; });
      placedY.push(ly);
      g.append('text')
        .attr('x', x(last.period) + 6).attr('y', ly)
        .attr('dominant-baseline', 'middle')
        .style('fill',           brand.name === selectedBrand ? CONFIG.selectedColor : CONFIG.neutralColor)
        .style('font-size',      '10px').style('font-family', FONT_LIGHT)
        .style('text-transform', 'uppercase').style('letter-spacing', '0.06em')
        .style('cursor', 'pointer')
        .text(truncLabel(brand.name, W))
        .on('click', (function(b) { return async function() { await selectBrand(b.name, dashboard); }; })(brand));
    });

    g.append('g').attr('transform', 'translate(0,' + h + ')')
      .call(d3.axisBottom(x).tickSize(3))
      .call(function(ax) { ax.select('.domain').attr('stroke', D.gridColor); })
      .selectAll('text')
      .style('fill', D.axisX.color).style('font-size', '11px')
      .style('font-family', D.axisX.font)
      .style('text-transform', 'uppercase').style('letter-spacing', '0.06em');

    g.append('g')
      .call(d3.axisLeft(y).ticks(4).tickSize(-w))
      .call(function(ax) {
        ax.select('.domain').remove();
        ax.selectAll('.tick line').attr('stroke', D.gridColor).attr('stroke-dasharray', '3,3');
      })
      .selectAll('text').style('fill', D.axisY.color).style('font-size', '11px')
      .style('font-family', D.axisY.font);
  }

  // ─── CHART: BAN ───────────────────────────────────────────────────────────
  function renderBAN(el, data, selectedBrand, D) {
    var sel = (Array.isArray(data) ? data.find(function(d) { return d.name === selectedBrand; }) || data[0] : null);
    var value = sel ? sel.value : (data && !Array.isArray(data) ? data : null);
    var rect = el.getBoundingClientRect();
    var W = rect.width || window.innerWidth || 200;
    var H = rect.height || window.innerHeight || 200;
    var fontSize = Math.min(Math.max(Math.min(W, H * 2) * 0.22, 40), 96);

    el.style.display        = 'flex';
    el.style.flexDirection  = 'column';
    el.style.alignItems     = 'center';
    el.style.justifyContent = 'center';
    el.style.height         = '100%';
    el.style.gap            = '8px';

    var displayVal = value !== null && value !== undefined ? parseFloat(value).toFixed(2) : '--';
    var displayLbl = sel ? sel.name : (selectedBrand || '');

    el.innerHTML =
      '<div style="font-size:' + fontSize + 'px;font-weight:400;line-height:1;' +
      'color:' + D.value.color + ';font-family:' + D.value.font + ';font-style:' + D.value.style + ';">' +
      displayVal + '</div>' +
      '<div style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;' +
      'color:' + D.label.color + ';font-family:' + D.label.font + ';">' +
      displayLbl + '</div>';
  }

  // ─── BANs ─────────────────────────────────────────────────────────────────
  function renderBANs(el, data, primary, D) {
    var rect = el.getBoundingClientRect(); var W = rect.width || 500, H = rect.height || 300;
    if (H < 120) { showTooSmall(el); return; }
    if (!data || !data.length) { showEmpty(el); return; }

    var sorted = [
      ...data.filter(function(d) { return d.name === primary; }),
      ...data.filter(function(d) { return d.name !== primary; }).sort(function(a,b) { return b.value - a.value; }),
    ];

    el.style.display = 'flex';
    el.style.alignItems = 'flex-end';
    el.style.flexWrap = 'wrap';
    el.style.padding = '16px 20px';

    sorted.forEach(function(d, i) {
      var isPrimary = d.name === primary;
      var wrap = document.createElement('div');
      wrap.style.cssText = isPrimary
        ? 'padding-right:24px;margin-right:24px;border-right:1px solid var(--grey-700);'
        : 'padding-right:20px;';

      var lbl = document.createElement('div');
      lbl.style.cssText = 'font-family:' + FONT_LIGHT + ';font-size:' + (isPrimary ? '7.5' : '7') + 'px;' +
        'text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;' +
        'color:' + (isPrimary ? D.primaryValue.color : D.compValue.color) + ';';
